# LLM配置
llm:
  provider: "deepseek" # deepseek/openai/anthropic/qwen
  model: "deepseek-chat"
  api_key: "sk-204632e546384c0796afbf44d7c8e232"
  base_url: "https://api.deepseek.com/v1"
  temperature: 0.7
  max_tokens: 2000

# Embedding配置
embedding:
  provider: "ollama"  # ollama/openai
  ollama_url: "http://localhost:11434"
  ollama_model: "nomic-embed-text"  # 推荐: nomic-embed-text, mxbai-embed-large, all-minilm
  openai_api_key: "sk-nUBEeoCenvXGiz8I22E6655730E64bD2B78e0752E4342598"
  openai_base_url: "https://api.gpt.ge/v1"
  openai_model: "text-embedding-3-small"  # 支持: text-embedding-3-small, text-embedding-ada-002等

# Chroma配置
vector_store:
  persist_directory: "./chroma_data"
  collection_name_prefix: "project_"

reranker:
  mode: "local_model"  # local_model/http
  model: "dengcao/bge-reranker-v2-m3"
  base_url: "http://localhost:11434"
  timeout: 20

# 平台API配置
platform:
  base_url: "http://localhost:8080"
  timeout: 30

# 服务配置
server:
  host: "0.0.0.0"
  port: 8001
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:8080"

logging:
  level: "INFO"
  console_level: "INFO"
  dir: "./logs"
